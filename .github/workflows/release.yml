name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64 + cmake
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake

      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=mingw-toolchain.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Verify artifact
        run: file build/Paster-plus-plus.exe | grep -q "PE32+ executable"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Paster-plus-plus.exe
          generate_release_notes: true
