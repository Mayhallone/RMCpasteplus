name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64 + cmake
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake

      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=mingw-toolchain.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Verify artifact
        run: |
          file build/Paster-plus-plus.exe | grep -q "PE32+ executable"

      - uses: actions/upload-artifact@v4
        with:
          name: Paster-plus-plus.exe
          path: build/Paster-plus-plus.exe
